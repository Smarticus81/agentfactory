<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BevOne Venue Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    .subtitle {
      color: #888;
      margin-bottom: 2rem;
    }
    .status {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }
    .status.loading { background: #1a1a2e; color: #7c83ff; }
    .status.ok { background: #0a2e1a; color: #4ade80; }
    .status.error { background: #2e0a0a; color: #f87171; }
    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      color: #7c83ff;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border: 1px solid #222;
      border-radius: 0.5rem;
      transition: border-color 0.2s;
    }
    a:hover { border-color: #7c83ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>BevOne Venue Agent</h1>
    <p class="subtitle">Voice-powered POS assistant</p>
    <div id="status" class="status loading">Checking status...</div>
    <div class="links">
      <a href="/health">Health Check</a>
      <a href="/api/pos/menu">Menu</a>
      <a href="/api/pos/tabs">Open Tabs</a>
    </div>
  </div>
  <script>
    fetch('/health')
      .then(r => r.json())
      .then(d => {
        const el = document.getElementById('status');
        el.textContent = 'Agent running: ' + (d.app || 'bevone-venue-agent');
        el.className = 'status ok';
      })
      .catch(() => {
        const el = document.getElementById('status');
        el.textContent = 'Agent offline';
        el.className = 'status error';
      });
  </script>
</body>
</html>
